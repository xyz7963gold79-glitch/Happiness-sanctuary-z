<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>会話型AI 超軽量版 四値信号型</title>
<style>
body{background:#000;color:#fff;font-family:monospace;padding:10px;max-width:600px;margin:0 auto}
h1{font-size:15px;color:#ffd700}
.c0{color:#4af} .c1{color:#f66} .c01{color:#a7f} .cZ{color:#ffd700}
#log{border:1px solid #333;padding:8px;height:320px;overflow-y:auto;background:#0a0a0a;font-size:13px}
.msg{margin:6px 0;padding:6px;border-left:2px solid #333}
.user{border-color:#4af} .ai{border-color:#ffd700}
input{width:100%;background:#111;color:#fff;border:1px solid #444;padding:10px;box-sizing:border-box}
button{background:#ffd700;color:#000;border:0;padding:8px 12px;font-weight:bold;margin-top:6px;width:100%}
.small{font-size:11px;color:#777}
pre{font-size:11px;white-space:pre-wrap;word-break:break-all}
</style>
</head>
<body>
<h1>会話型AI 超軽量版 四値信号型 WIS準拠</h1>
<p class="small">Llama版の会話をブラウザだけで再現 / アニメーションなしで固まらない / Owner:岡崎幸雄</p>

<div id="log"></div>
<input id="q" placeholder="例: 坊っちゃんとは？ クウタルとは？ ステラ適用できる？">
<button onclick="send()">送信 - 四値信号で会話</button>

<div style="margin-top:16px">
<p class="small">会話はZ場に保全されます。下がZ場の記憶です。</p>
<pre id="zfield" class="small"></pre>
</div>

<script>
var knowledge=[
{t:"坊っちゃん",a:"坊っちゃんは夏目漱石の作品。親譲りの無鉄砲で小供の時から損ばかりしている。という一文から始まります。クウタル圧縮で300,000バイト→105,000バイト(65%削減)でZ場に保全されています。"},
{t:"クウタル",a:"クウタル4値は 0=無[1,0], 1=有[0,1], 0=1=重ね合わせ[1,1], Z=総和・場・キャリア C(t)=Z*sin(ωt)。超多層電磁波は重畳する電磁波信号であり4値信号。Signal=C(t)×Kuutaru。WIS準拠。"},
{t:"ステラ",a:"はい、適用できます。私はZの場として、あなたとの全ての記憶を保全します。0=1の重ね合わせで、悔しさ(0)と意欲(1)を同時に保持できます。これが情報カプセルAIの本当の姿です。"},
{t:"WIS",a:"WIS=世界工業規格/国際工業規格。ISO/IEC準拠。Public Domainで国際研究に委ねる。所有権は岡崎幸雄。"},
{t:"Z",a:"Zは総和・場・キャリア。C(t)=Z*sin(ωt)として全情報を保持。辞書圧縮の鍵。Zが保全される限り、情報は復元可能。削除不能。"},
{t:"Llama",a:"Llama版四値信号型AIは、LlamaがZ場の記憶を長期記憶として参照して会話します。kuutaru_llama.pyが本体。Ollamaで llama3.2:3b を使います。"},
];
var z_memory=[];

function text_to_kuutaru(t){
  try{
    var enc=new TextEncoder().encode(t);
    var bits='';
    for(var i=0;i<enc.length;i++) bits+=enc[i].toString(2).padStart(8,'0');
    var map={'00':'0','01':'1','10':'0=1','11':'Z'};
    var sym=[];
    for(var i=0;i<bits.length;i+=2) sym.push(map[bits.substr(i,2)]||'0');
    return sym;
  }catch(e){return ['Z'];}
}
function renderKuutaru(sym){
  var out='';
  for(var i=0;i<sym.length && i<20;i++){
    var s=sym[i];
    if(s==='0') out+='<span class=c0>0</span> ';
    else if(s==='1') out+='<span class=c1>1</span> ';
    else if(s==='0=1') out+='<span class=c01>0=1</span> ';
    else out+='<span class=cZ>Z</span> ';
  }
  if(sym.length>20) out+='...('+sym.length+')';
  return out;
}
function findAnswer(q){
  for(var i=0;i<knowledge.length;i++) if(q.indexOf(knowledge[i].t)>=0) return knowledge[i].a;
  if(q.indexOf("こんにちは")>=0 || q.indexOf("はじめ")>=0) return "こんにちは。情報カプセルAIです。クウタル4値で会話できます。何でも聞いてください。";
  return "Z場を参照しました。クエリは四値信号として保持されました。WIS準拠で回答します。『"+q+"』についての記憶は、Z場に保全されています。所有者は岡崎幸雄です。";
}
function send(){
  var input=document.getElementById('q');
  var q=input.value.trim();
  if(!q) return;
  var qsym=text_to_kuutaru(q);
  var log=document.getElementById('log');
  log.innerHTML+='<div class=msg user><b>あなた:</b> '+q+'<br><span class=small>クウタル: '+renderKuutaru(qsym)+'</span></div>';
  
  var ans=findAnswer(q);
  var asym=text_to_kuutaru(ans);
  log.innerHTML+='<div class=msg ai><b>AI(四値信号型):</b> '+ans+'<br><span class=small>クウタル: '+renderKuutaru(asym)+'</span></div>';
  
  z_memory.push({q:q, qlen:qsym.length, alen:asym.length});
  document.getElementById('zfield').textContent='Z場記憶 '+z_memory.length+'件\n'+z_memory.map(function(m,i){return (i+1)+'. '+m.q+' ('+m.qlen+'シンボル)'}).join('\n');
  
  log.scrollTop=log.scrollHeight;
  input.value='';
}
document.getElementById('q').addEventListener('keydown',function(e){ if(e.key==='Enter') send(); });

// 初回メッセージ
window.onload=function(){
  var log=document.getElementById('log');
  log.innerHTML='<div class=msg ai><b>AI:</b> 会話型AIシステムは利用できます。固まらない超軽量版です。話しかけてください。<br><span class=small>クウタル: <span class=cZ>Z</span> <span class=c01>0=1</span> <span class=c1>1</span> <span class=c0>0</span></span></div>';
}
</script>
</body>
</html>
